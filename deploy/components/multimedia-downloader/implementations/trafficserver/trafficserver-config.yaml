apiVersion: v1
kind: ConfigMap
metadata:
  name: multimedia-downloader-config
  namespace: default
data:
  # --- Storage Configuration (REQUIRED for ATS to start) ---
  storage.config: |
    var/trafficserver 1G

  # --- Main System Configuration ---
  records.yaml: |
    records:
      # Network & Ports
      - name: proxy.config.http.server_ports
        value: "8080"
      - name: proxy.config.http.connect_ports
        value: "443 80 8080" # Allows HTTPS tunneling/CONNECT

      # Forward Proxy Mode (The fix for your dynamic HF subdomains)
      - name: proxy.config.url_remap.remap_required
        value: 0 
      - name: proxy.config.http.forward_proxy_enabled
        value: 1

      # Cache Configuration
      - name: proxy.config.http.cache.http
        value: 1
      - name: proxy.config.cache.ram_cache.size
        value: 536870912
      - name: proxy.config.http.cache.range.lookup
        value: 1
      - name: proxy.config.http.cache.range.write
        value: 1
      - name: proxy.config.cache.enable_read_while_writer
        value: 1

      # Logging & Debugging (Output to stdout for 'kubectl logs')
      - name: proxy.config.diags.debug.enabled
        value: 1
      - name: proxy.config.diags.debug.tags
        value: "http|cache|dns|proxy"
      - name: proxy.config.diags.output.status
        value: "O"
      - name: proxy.config.diags.output.error
        value: "O"
      - name: proxy.config.log.logging_enabled
        value: 3

  # --- Cache Rules for Multimedia ---
  cache.config: |
    # Multimedia specific TTLs
    dest_domain=. suffix=mp4 ttl-in-cache=7d
    dest_domain=. suffix=webm ttl-in-cache=7d
    dest_domain=. suffix=bin ttl-in-cache=30d
    dest_domain=. suffix=safetensors ttl-in-cache=30d
    # Default: cache everything for 1 day
    dest_domain=. ttl-in-cache=1d

  # --- Security & IP Access ---
  ip_allow.yaml: |
    ip_allow:
      - apply: in
        ip_addrs: 0.0.0.0-255.255.255.255
        action: allow
      - apply: in
        ip_addrs: "::-ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff"
        action: allow

  # --- Optional: Custom Logging Format ---
  logging.yaml: |
    formats:
      - name: custom
        format: '%<cqtq> %<ttms> %<chi> %<crc>/%<pssc> %<psql> %<cqhm> %<cquc> %<caun> %<phr>/%<pqsn> %<psct> %<pscl>'
    logs:
      - filename: access
        format: custom
        mode: ascii