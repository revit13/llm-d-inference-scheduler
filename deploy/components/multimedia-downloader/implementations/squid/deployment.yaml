apiVersion: apps/v1
kind: Deployment
metadata:
  name: multimedia-downloader
  labels:
    app: multimedia-downloader
    cache-implementation: squid
    component: multimedia-downloader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multimedia-downloader
      cache-implementation: squid
      component: multimedia-downloader
  template:
    metadata:
      labels:
        app: multimedia-downloader
        cache-implementation: squid
        component: multimedia-downloader
    spec:
      containers:
      - name: squid
        image: ubuntu/squid:6.1-23.10_beta
        imagePullPolicy: IfNotPresent
        command: ["squid"]
        args: ["-NYCd1"]
        ports:
        - name: http-proxy
          containerPort: 8080
          protocol: TCP
        volumeMounts:
        - name: squid-config
          mountPath: /etc/squid/squid.conf
          subPath: squid.conf
        - name: cache-volume
          mountPath: /var/cache/squid
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f /var/cache/squid/squid.pid && kill -0 $(cat /var/cache/squid/squid.pid)
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - test -f /var/cache/squid/squid.pid && kill -0 $(cat /var/cache/squid/squid.pid)
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: squid-config
        configMap:
          name: squid-multimedia-downloader-config
      - name: cache-volume
        emptyDir:
          sizeLimit: 64Mi
