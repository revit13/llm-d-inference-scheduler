# SSL Bump delta — apply these changes to squid-config.yaml's squid.conf key.
# See Step 3 of the SSL Bump Implementation Guide in README.md for instructions.
#
# 1. Replace the plain `http_port 8080` line with the SSL Bump port block below.
# 2. Insert the sslcrtd_* and ssl_bump directives immediately after the port block.

# --- SSL Bump Port Configuration (replaces plain http_port 8080) ---
http_port 8080 ssl-bump \
  cert=/etc/squid/ssl_cert/squid-ca-cert.pem \
  key=/etc/squid/ssl_cert/squid-ca-key.pem \
  generate-host-certificates=on \
  dynamic_cert_mem_cache_size=16MB

# SSL certificate database
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 16MB
sslcrtd_children 10 startup=5 idle=1

# SSL Bump rules — peek to read SNI, then MITM all connections
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# Splice (pass-through) specific domains without interception (optional)
# acl no_bump_sites ssl::server_name .bank.com
# ssl_bump splice no_bump_sites
