apiVersion: v1
kind: ConfigMap
metadata:
  name: squid-multimedia-downloader-config
  labels:
    cache-implementation: squid
    component: multimedia-downloader
data:
  squid.conf: |-
    # --- Logging Fixes ---
    # Force Squid to flush logs to disk immediately
    buffered_logs off
    # Use the native file path without the 'stdio:' prefix
    access_log /var/cache/squid/access.log squid

    # --- Listen Port ---
    http_port 8080

    # --- PID/Files for Non-Root/SCC Compliance ---
    pid_filename /var/cache/squid/squid.pid
    netdb_filename none

    # --- Storage & Caching ---
    cache_dir null /tmp
    cache_mem 2048 MB
    maximum_object_size_in_memory 1024 MB
    maximum_object_size 100 GB
    minimum_object_size 0 KB

    # --- Aggressive Caching for AI Models & Images ---
    refresh_pattern -i \.(bin|safetensors|gguf|pt|pth|onnx|msgpack|json|yaml|txt)$ 10080 100% 43200 override-expire ignore-no-cache ignore-no-store
    refresh_pattern -i \.(jpg|jpeg|png|gif|webp|bmp|tiff)$ 10080 100% 43200 override-expire ignore-no-cache ignore-no-store ignore-private
    refresh_pattern . 10080 100% 43200 override-expire ignore-no-cache ignore-no-store

    # --- Access Control ---
    acl CONNECT method CONNECT
    http_access allow localhost
    http_access allow CONNECT
    http_access allow all

    # --- Performance & DNS ---
    collapsed_forwarding on
    dns_nameservers 8.8.8.8 8.8.4.4
