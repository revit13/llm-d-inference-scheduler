apiVersion: v1
kind: ConfigMap
metadata:
  name: squid-multimedia-downloader-config
  labels:
    cache-implementation: squid
    component: multimedia-downloader
data:
  squid.conf: |-
    # Force Squid to flush logs to disk immediately
    buffered_logs off
    access_log /var/cache/squid/access.log squid

    # --- Listen Port ---
    http_port 8080

    # --- PID/Files for Non-Root/SCC Compliance ---
    pid_filename /var/cache/squid/squid.pid
    netdb_filename none

    # --- Storage & Caching ---
    cache_mem 1024 MB
    maximum_object_size 500 MB

    # --- Aggressive Caching for Images ---
    # Keeps images with no headers for 7 days
    refresh_pattern -i \.(jpg|jpeg|png|gif|webp|bmp|tiff)$ 10080 100% 43200

    # --- Access Control ---
    http_access allow all

    # --- Performance & DNS ---
    collapsed_forwarding on
    dns_nameservers 8.8.8.8 8.8.4.4
