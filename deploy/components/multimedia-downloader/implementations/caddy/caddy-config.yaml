apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-multimedia-downloader-config
  labels:
    app: multimedia-downloader
data:
  Caddyfile: |
    # Multimedia fetch + health endpoint
    :8080 {
        handle /health {
            respond "healthy" 200
        }

        handle /fetch* {
            reverse_proxy {query.url} {
                header_up Host {upstream_hostport}
                header_up User-Agent "llm-d-multimedia-downloader/1.0"

                transport http {
                    tls_insecure_skip_verify
                    dial_timeout 30s
                    response_header_timeout 300s
                    read_buffer_size 32kb
                    write_buffer_size 32kb
                }
            }

            header X-Cache-Status "MISS"
        }
    }

    # HuggingFace mirror endpoint
    # Set HF_ENDPOINT=http://caddy-multimedia-downloader:8081 in vllm
    :8081 {
        reverse_proxy https://huggingface.co {
            header_up Host huggingface.co
            header_up User-Agent "llm-d-multimedia-downloader/1.0"

            transport http {
                tls_server_name huggingface.co
                dial_timeout 30s
                response_header_timeout 300s
                read_buffer_size 32kb
                write_buffer_size 32kb
            }
        }
    }
