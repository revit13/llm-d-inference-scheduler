apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${POOL_NAME}-decode-route
  labels:
    istio.io/rev: llm-d-gateway
spec:
  parentRefs:
  - name: inference-gateway
  rules:
  - matches:
    - headers:
      - type: Exact
        name: EPP-Phase
        value: decode
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: ${POOL_NAME}-decode
      port: 8000
    timeouts:
      request: 30s
