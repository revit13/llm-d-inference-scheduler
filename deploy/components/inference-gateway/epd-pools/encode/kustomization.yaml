# ------------------------------------------------------------------------------
# Encode InferencePool + EPP
#
# Selects pods labelled `llm-d.ai/role: encode` and routes them through a
# dedicated EPP. Used by the e-p-d-pools env to expose encode as a discrete
# routing surface for the coordinator pipeline.
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- inference-pool.yaml
- epp.yaml
