# ------------------------------------------------------------------------------
# Inference Gateway — single-pool topology
#
# Single InferencePool + EPP behind a catch-all HTTPRoute. Pair with
# components/inference-gateway/base/ (the Gateway CR lives there).
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- service-accounts.yaml
- rbac.yaml
- inference-pools.yaml
- services.yaml
- deployment.yaml
- httproutes.yaml
