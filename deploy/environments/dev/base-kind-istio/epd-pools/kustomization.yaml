# ------------------------------------------------------------------------------
# KIND base-kind-istio — encode/prefill/decode pools topology
#
# Selected by `DISAGG_POOLS_TOPOLOGY=true` in scripts/kind-dev-env.sh.
# Shared base + per-phase InferencePools/EPPs and header-based HTTPRoutes.
# Deliberately omits the single-pool EPP, its catch-all HTTPRoute, and the
# `${EPP_NAME}-insecure-tls` DestinationRule — none of those exist in this
# topology.
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base/
- ../../../../components/inference-gateway/epd-pools/
