# EPP config for the encode-only EPP in the e-p-d-pools env.
# The pool selector already restricts to pods labelled llm-d.ai/role: encode;
# this config provides a single profile that filters/scores encode endpoints.
apiVersion: llm-d.ai/v1alpha1
kind: EndpointPickerConfig
plugins:
- type: encode-filter
- type: max-score-picker
- type: single-profile-handler
schedulingProfiles:
- name: default
  plugins:
  - pluginRef: encode-filter
  - pluginRef: max-score-picker
